# =============================================================================
# SuperVim + Hyprpaper Configuration
# =============================================================================

preload = ~/.config/hypr/wallpapers/tokyo-night.jpg
wallpaper = ,~/.config/hypr/wallpapers/tokyo-night.jpg

# Fallback wallpaper if main one is not found
preload = ~/.config/hypr/wallpapers/fallback.jpg
wallpaper = ,~/.config/hypr/wallpapers/fallback.jpg

splash = false
ipc = on