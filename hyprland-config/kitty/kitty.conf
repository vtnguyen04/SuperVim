# =============================================================================
# SuperVim + Kitty Configuration - Tokyo Night Theme
# =============================================================================

# Font configuration
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 15.0

# Scrollback
scrollback_lines 10000
scrollback_pager_history_size 0

# Mouse
mouse_hide_wait 3.0
url_color #7aa2f7
url_style curly

# Terminal bell
enable_audio_bell no
visual_bell_duration 0.0

# Window layout
remember_window_size  yes
initial_window_width  1200
initial_window_height 800
window_padding_width 8
hide_window_decorations yes
resize_debounce_time 0.1

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {index}: {title}
active_tab_title_template {index}: {title}

# Advanced
shell_integration enabled
allow_remote_control yes
listen_on unix:/tmp/kitty

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# =============================================================================
# Tokyo Night Color Scheme
# =============================================================================

# Basic colors
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467c

# Cursor colors
cursor #c0caf5
cursor_text_color #1a1b26

# URL underline color when hovering
url_color #7aa2f7

# Kitty window border colors
active_border_color #7aa2f7
inactive_border_color #565f89
bell_border_color #ff9e64

# OS Window titlebar colors
wayland_titlebar_color #1a1b26

# Tab bar colors
tab_bar_background #1a1b26
active_tab_foreground #1a1b26
active_tab_background #7aa2f7
inactive_tab_foreground #545c7e
inactive_tab_background #292e42

# Colors for marks (marked text in the terminal)
mark1_foreground #1a1b26
mark1_background #7aa2f7
mark2_foreground #1a1b26
mark2_background #bb9af7
mark3_foreground #1a1b26
mark3_background #9ece6a

# The 16 terminal colors

# black
color0 #15161e
color8 #414868

# red
color1 #f7768e
color9 #f7768e

# green
color2  #9ece6a
color10 #9ece6a

# yellow
color3  #e0af68
color11 #e0af68

# blue
color4  #7aa2f7
color12 #7aa2f7

# magenta
color5  #bb9af7
color13 #bb9af7

# cyan
color6  #73daca
color14 #73daca

# white
color7  #c0caf5
color15 #c0caf5

# =============================================================================
# Key mappings
# =============================================================================

# Clipboard
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Font size
map ctrl+equal change_font_size all +2.0
map ctrl+plus change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# Window management
map ctrl+shift+enter new_window
map ctrl+shift+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Tab management
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

# SuperVim integration
map ctrl+alt+n launch --type=window nvim
map ctrl+alt+shift+n launch --type=window nvim .

# Scrolling
map ctrl+shift+up scroll_line_up
map ctrl+shift+down scroll_line_down
map ctrl+shift+page_up scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home scroll_home
map ctrl+shift+end scroll_end